openapi: 3.0.3
info:
  title: Stock Index Forecasting Service API
  description: API для тестирования моделей прогнозирования фондовых индексов
  version: 1.0.0

servers:
  - url: http://localhost:8000/api
    description: Development server
  - url: https://api.trading-test.com/api
    description: Production server

tags:
  - name: Datasets
    description: Управление датасетами финансовых данных
  - name: Experiments
    description: Управление ML экспериментами
  - name: Models
    description: Информация о доступных моделях
  - name: Results
    description: Получение результатов экспериментов

paths:
  # ========== DATASETS ENDPOINTS ==========
  /datasets:
    get:
      tags:
        - Datasets
      summary: Получить список датасетов
      description: Возвращает список всех доступных датасетов с пагинацией
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Номер страницы
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Количество элементов на странице
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Поиск по названию датасета
      responses:
        '200':
          description: Успешный запрос
          content:
            application/json:
              schema:
                type: object
                properties:
                  datasets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dataset'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      tags:
        - Datasets
      summary: Загрузить новый датасет
      description: Загружает новый датасет из файла или внешнего источника
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV файл с данными
                name:
                  type: string
                  description: Название датасета
                description:
                  type: string
                  description: Описание датасета
                source:
                  type: string
                  enum: [upload, yahoo, moex]
                  description: Источник данных
                symbol:
                  type: string
                  description: Символ индекса (например, ^GSPC, RTSI)
                timeframe:
                  type: string
                  enum: [daily, hourly, minute]
                  default: daily
                  description: Таймфрейм данных
      responses:
        '201':
          description: Датасет успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /datasets/{dataset_id}:
    get:
      tags:
        - Datasets
      summary: Получить информацию о датасете
      description: Возвращает детальную информацию о датасете
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
          description: UUID датасета
      responses:
        '200':
          description: Успешный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetDetails'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      tags:
        - Datasets
      summary: Удалить датасет
      description: Удаляет датасет и все связанные данные
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
          description: UUID датасета
      responses:
        '204':
          description: Датасет успешно удален
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /datasets/{dataset_id}/data:
    get:
      tags:
        - Datasets
      summary: Получить данные датасета
      description: Возвращает финансовые данные датасета с возможностью фильтрации по времени
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
          description: UUID датасета
        - name: start_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Начальная дата периода
        - name: end_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Конечная дата периода
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 1000
          description: Ограничение количества записей
      responses:
        '200':
          description: Успешный запрос
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FinancialData'
                  metadata:
                    $ref: '#/components/schemas/Dataset'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /datasets/{dataset_id}/statistics:
    get:
      tags:
        - Datasets
      summary: Получить статистику датасета
      description: Возвращает статистическую информацию о датасете
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
          description: UUID датасета
      responses:
        '200':
          description: Успешный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetStatistics'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ========== EXPERIMENTS ENDPOINTS ==========
  /experiments:
    get:
      tags:
        - Experiments
      summary: Получить список экспериментов
      description: Возвращает список всех экспериментов с пагинацией
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, running, completed, failed, cancelled]
        - name: dataset_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Успешный запрос
          content:
            application/json:
              schema:
                type: object
                properties:
                  experiments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Experiment'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      tags:
        - Experiments
      summary: Создать новый эксперимент
      description: Создает и запускает новый ML эксперимент
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - dataset_id
                - model_type
                - config
              properties:
                name:
                  type: string
                  description: Название эксперимента
                description:
                  type: string
                  description: Описание эксперимента
                dataset_id:
                  type: string
                  description: UUID датасета для обучения
                model_type:
                  type: string
                  enum: [linear_regression, random_forest, arima, lstm, prophet]
                  description: Тип модели
                config:
                  $ref: '#/components/schemas/ModelConfig'
                test_size:
                  type: number
                  minimum: 0.1
                  maximum: 0.5
                  default: 0.2
                  description: Доля данных для тестирования
      responses:
        '201':
          description: Эксперимент успешно создан и запущен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Experiment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /experiments/{experiment_id}:
    get:
      tags:
        - Experiments
      summary: Получить информацию об эксперименте
      description: Возвращает детальную информацию об эксперименте
      parameters:
        - name: experiment_id
          in: path
          required: true
          schema:
            type: string
          description: UUID эксперимента
      responses:
        '200':
          description: Успешный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentDetails'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      tags:
        - Experiments
      summary: Отменить/удалить эксперимент
      description: Отменяет выполняющийся эксперимент или удаляет завершенный
      parameters:
        - name: experiment_id
          in: path
          required: true
          schema:
            type: string
          description: UUID эксперимента
      responses:
        '204':
          description: Эксперимент успешно отменен/удален
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /experiments/{experiment_id}/results:
    get:
      tags:
        - Results
      summary: Получить результаты эксперимента
      description: Возвращает результаты выполнения эксперимента
      parameters:
        - name: experiment_id
          in: path
          required: true
          schema:
            type: string
          description: UUID эксперимента
      responses:
        '200':
          description: Успешный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentResults'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /experiments/{experiment_id}/predictions:
    get:
      tags:
        - Results
      summary: Получить предсказания эксперимента
      description: Возвращает детальные предсказания модели
      parameters:
        - name: experiment_id
          in: path
          required: true
          schema:
            type: string
          description: UUID эксперимента
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json, csv]
            default: json
          description: Формат возвращаемых данных
      responses:
        '200':
          description: Успешный запрос
          content:
            application/json:
              schema:
                type: object
                properties:
                  predictions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Prediction'
            text/csv:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ========== MODELS ENDPOINTS ==========
  /models:
    get:
      tags:
        - Models
      summary: Получить список доступных моделей
      description: Возвращает информацию о всех поддерживаемых моделях
      responses:
        '200':
          description: Успешный запрос
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/ModelInfo'
        '500':
          $ref: '#/components/responses/ServerError'

  /models/{model_type}/parameters:
    get:
      tags:
        - Models
      summary: Получить параметры модели
      description: Возвращает схему параметров для указанного типа модели
      parameters:
        - name: model_type
          in: path
          required: true
          schema:
            type: string
            enum: [linear_regression, random_forest, arima, lstm, prophet]
          description: Тип модели
      responses:
        '200':
          description: Успешный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelParametersSchema'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ========== COMPARISON ENDPOINTS ==========
  /comparison:
    post:
      tags:
        - Results
      summary: Сравнить несколько экспериментов
      description: Сравнивает метрики нескольких экспериментов
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - experiment_ids
              properties:
                experiment_ids:
                  type: array
                  items:
                    type: string
                  description: Список UUID экспериментов для сравнения
                metrics:
                  type: array
                  items:
                    type: string
                    enum: [mse, mae, rmse, r2, accuracy, precision, recall, f1]
                  description: Список метрик для сравнения
      responses:
        '200':
          description: Успешный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparisonResults'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  schemas:
    # ========== BASE SCHEMAS ==========
    Pagination:
      type: object
      properties:
        page:
          type: integer
          description: Текущая страница
        limit:
          type: integer
          description: Количество элементов на странице
        total:
          type: integer
          description: Общее количество элементов
        total_pages:
          type: integer
          description: Общее количество страниц

    # ========== DATASET SCHEMAS ==========
    Dataset:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID датасета
        name:
          type: string
          description: Название датасета
        description:
          type: string
          description: Описание датасета
        source:
          type: string
          enum: [upload, yahoo, moex]
          description: Источник данных
        symbol:
          type: string
          description: Символ индекса
        timeframe:
          type: string
          enum: [daily, hourly, minute]
          description: Таймфрейм данных
        start_date:
          type: string
          format: date-time
          description: Начальная дата данных
        end_date:
          type: string
          format: date-time
          description: Конечная дата данных
        record_count:
          type: integer
          description: Количество записей
        created_at:
          type: string
          format: date-time
          description: Дата создания

    DatasetDetails:
      allOf:
        - $ref: '#/components/schemas/Dataset'
        - type: object
          properties:
            columns:
              type: array
              items:
                type: string
              description: Список колонок в датасете
            size_bytes:
              type: integer
              description: Размер датасета в байтах

    FinancialData:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Временная метка
        open:
          type: number
          format: float
          description: Цена открытия
        high:
          type: number
          format: float
          description: Максимальная цена
        low:
          type: number
          format: float
          description: Минимальная цена
        close:
          type: number
          format: float
          description: Цена закрытия
        volume:
          type: number
          format: int64
          description: Объем торгов
        indicators:
          type: object
          description: Рассчитанные технические индикаторы
          properties:
            sma_20:
              type: number
              format: float
            rsi:
              type: number
              format: float
            macd:
              type: number
              format: float

    DatasetStatistics:
      type: object
      properties:
        basic_stats:
          type: object
          properties:
            mean:
              type: number
              format: float
            std:
              type: number
              format: float
            min:
              type: number
              format: float
            max:
              type: number
              format: float
            median:
              type: number
              format: float
        returns_stats:
          type: object
          properties:
            mean_return:
              type: number
              format: float
            volatility:
              type: number
              format: float
            sharpe_ratio:
              type: number
              format: float
        missing_values:
          type: integer
          description: Количество пропущенных значений

    # ========== EXPERIMENT SCHEMAS ==========
    Experiment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID эксперимента
        name:
          type: string
          description: Название эксперимента
        description:
          type: string
          description: Описание эксперимента
        dataset_id:
          type: string
          format: uuid
          description: UUID используемого датасета
        model_type:
          type: string
          description: Тип модели
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
          description: Статус эксперимента
        progress:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Прогресс выполнения в процентах
        created_at:
          type: string
          format: date-time
          description: Дата создания
        updated_at:
          type: string
          format: date-time
          description: Дата последнего обновления

    ExperimentDetails:
      allOf:
        - $ref: '#/components/schemas/Experiment'
        - type: object
          properties:
            config:
              $ref: '#/components/schemas/ModelConfig'
            dataset:
              $ref: '#/components/schemas/Dataset'
            error_message:
              type: string
              description: Сообщение об ошибке (если статус failed)

    ModelConfig:
      type: object
      description: Конфигурация модели (варьируется в зависимости от типа модели)
      properties:
        # Общие параметры
        target_column:
          type: string
          default: close
          description: Целевая переменная
        features:
          type: array
          items:
            type: string
          description: Список признаков для обучения
        # Параметры для Random Forest
        n_estimators:
          type: integer
          default: 100
        max_depth:
          type: integer
        # Параметры для ARIMA
        p:
          type: integer
          default: 1
        d:
          type: integer
          default: 1
        q:
          type: integer
          default: 1
        # Параметры для LSTM
        hidden_size:
          type: integer
          default: 50
        num_layers:
          type: integer
          default: 2

    ExperimentResults:
      type: object
      properties:
        experiment_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed, failed, running]
        metrics:
          type: object
          properties:
            regression:
              type: object
              properties:
                mse:
                  type: number
                  format: float
                mae:
                  type: number
                  format: float
                rmse:
                  type: number
                  format: float
                r2:
                  type: number
                  format: float
            classification:
              type: object
              properties:
                accuracy:
                  type: number
                  format: float
                precision:
                  type: number
                  format: float
                recall:
                  type: number
                  format: float
                f1:
                  type: number
                  format: float
        execution_time:
          type: number
          format: float
          description: Время выполнения в секундах
        model_size:
          type: integer
          description: Размер модели в байтах
        created_at:
          type: string
          format: date-time

    Prediction:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        actual:
          type: number
          format: float
          description: Фактическое значение
        predicted:
          type: number
          format: float
          description: Предсказанное значение
        error:
          type: number
          format: float
          description: Ошибка предсказания

    # ========== MODEL SCHEMAS ==========
    ModelInfo:
      type: object
      properties:
        type:
          type: string
          description: Тип модели
        name:
          type: string
          description: Человеко-читаемое название
        description:
          type: string
          description: Описание модели
        category:
          type: string
          enum: [regression, classification, time_series]
          description: Категория модели
        supported_features:
          type: array
          items:
            type: string
          description: Поддерживаемые типы признаков

    ModelParametersSchema:
      type: object
      properties:
        model_type:
          type: string
        parameters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: Название параметра
              type:
                type: string
                enum: [integer, float, string, boolean, array]
                description: Тип параметра
              default:
                description: Значение по умолчанию
              required:
                type: boolean
                default: false
              description:
                type: string
                description: Описание параметра
              constraints:
                type: object
                description: Ограничения значения

    # ========== COMPARISON SCHEMAS ==========
    ComparisonResults:
      type: object
      properties:
        experiments:
          type: array
          items:
            type: object
            properties:
              experiment_id:
                type: string
                format: uuid
              experiment_name:
                type: string
              metrics:
                type: object
        best_by_metric:
          type: object
          additionalProperties:
            type: string
            format: uuid
          description: Лучший эксперимент по каждой метрике

  # ========== RESPONSES ==========
  responses:
    BadRequest:
      description: Неверный запрос
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              details:
                type: object

    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Resource not found"

    ServerError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Internal server error"
              request_id:
                type: string
                description: ID запроса для debugging

  # ========== SECURITY ==========
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []
